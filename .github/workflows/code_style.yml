name: Code Style & Type Check

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Set up Python 3.10
      run: uv python install 3.10
    - name: Install linting dependencies
      run: uv pip install --system flake8 flake8-bugbear yapf isort mypy
    - name: Install package (no heavy deps)
      run: uv pip install --system --no-deps -e .
    - name: Lint with flake8
      run: flake8 LaMer/ test/ --count --show-source --statistics
    - name: Check code formatting
      run: |
        yapf -r -d LaMer/ test/
        isort --check LaMer/ test/
    - name: Type check
      run: mypy -p LaMer --no-incremental
