name: Code Style & Type Check

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: pip
    - name: Install linting dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install flake8 flake8-bugbear yapf isort mypy
    - name: Install package (no heavy deps)
      run: |
        python -m pip install --no-deps -e .
    - name: Lint with flake8
      run: |
        flake8 LaMer/ test/ --count --show-source --statistics
    - name: Check code formatting
      run: |
        yapf -r -d LaMer/ test/
        isort --check LaMer/ test/
    - name: Type check
      run: |
        mypy -p LaMer --no-incremental
