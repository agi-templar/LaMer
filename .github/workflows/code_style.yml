name: Code Style & Type Check

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Set up Python 3.10
      run: uv python install 3.10
    - name: Install dependencies
      run: |
        uv venv
        uv pip install flake8 flake8-bugbear yapf isort mypy
        uv pip install --no-deps -e .
    - name: Lint with flake8
      run: uv run flake8 LaMer/ test/ --count --show-source --statistics
    - name: Check code formatting
      run: |
        uv run yapf -r -d LaMer/ test/
        uv run isort --check LaMer/ test/
    - name: Type check
      run: uv run mypy -p LaMer --no-incremental
